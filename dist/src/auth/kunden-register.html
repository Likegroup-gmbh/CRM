<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kunden Registrierung | CRM</title>
  <script type="module" crossorigin src="/assets/kundenRegister-Dq03reVe.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/modulepreload-polyfill-B5Qt9EMX.js">
  <link rel="modulepreload" crossorigin href="/assets/config-DuKnp__J.js">
  <link rel="modulepreload" crossorigin href="/assets/auth-bdcxAhgD.js">
  <link rel="stylesheet" crossorigin href="/assets/components-BFXoTOTT.css">
</head>
<body style="margin: 0; padding: 0;">
  
  <div class="login-split-container">
    <div class="login-left">
      <div class="login-box">
        <div class="login-logo-wrapper">
          <img src="/assets/background/Logo-Icon-gray.svg" alt="Logo" class="login-logo">
        </div>
        <h2>Kunden-Registrierung</h2>

        <div id="msg" class="text-error" style="display: none;"></div>

        <form id="register-form">
          <div class="form-box">
            <label class="label" for="name">Name</label>
            <input id="name" class="input" type="text" placeholder="Max Mustermann" required />
          </div>
          <div class="form-box">
            <label class="label" for="email">E-Mail</label>
            <input id="email" class="input" type="email" placeholder="kunde@example.com" required />
          </div>
          <div class="form-box">
            <label class="label" for="password">Passwort</label>
            <input id="password" class="input" type="password" placeholder="••••••••" minlength="8" required />
          </div>
          <div class="form-box">
            <button id="btn-submit" type="submit" class="btn primary-btn" style="width: 100%;">Konto erstellen</button>
          </div>
          <div class="login-divider">
            <span>Login</span>
          </div>
          <div class="register-links-row">
            <a href="/" class="register-link-btn">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1" />
              </svg>
              Zurück zum Login
            </a>
          </div>
        </form>
      </div>
    </div>
    <div class="login-right"></div>
  </div>

</body>
</html>
