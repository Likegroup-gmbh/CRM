<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrierung | CRM</title>
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
    <style>
      .loading-state {
        text-align: center;
        padding: var(--space-xl, 32px);
      }
      .error-state {
        text-align: center;
        padding: var(--space-xl, 32px);
      }
      .error-state svg {
        width: 64px;
        height: 64px;
        color: var(--color-error, #dc3545);
        margin-bottom: var(--space-md, 16px);
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid var(--border-color, #e0e0e0);
        border-top-color: var(--color-primary, #007bff);
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto var(--space-md, 16px);
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  <script type="module" crossorigin src="/assets/magicRegister-BXC2N6h8.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/modulepreload-polyfill-B5Qt9EMX.js">
  <link rel="modulepreload" crossorigin href="/assets/config-DuKnp__J.js">
  <link rel="modulepreload" crossorigin href="/assets/auth-DqylGLjk.js">
  <link rel="stylesheet" crossorigin href="/assets/components-CXEGSY1P.css">
</head>
<body style="margin: 0; padding: 0;">
  
  <div class="login-split-container">
    <div class="login-left">
      <div class="login-box">
        <div class="login-logo-wrapper">
          <img src="/assets/background/Logo-Icon-gray.svg" alt="Logo" class="login-logo">
        </div>
        
        <!-- Loading State -->
        <div id="loading-state" class="loading-state">
          <div class="spinner"></div>
          <p>Link wird überprüft...</p>
        </div>

        <!-- Error State -->
        <div id="error-state" class="error-state" style="display: none;">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z" />
          </svg>
          <h2>Link ungültig</h2>
          <p id="error-message">Dieser Link ist ungültig oder abgelaufen.</p>
          <a href="/" class="btn primary-btn" style="margin-top: var(--space-md);">Zurück zur Startseite</a>
        </div>

        <!-- Registration Form -->
        <div id="register-state" style="display: none;">
          <h2>Konto erstellen</h2>
          
          <div id="msg" class="text-error" style="display: none;"></div>

          <form id="register-form">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-md, 16px);">
              <div class="form-box">
                <label class="label" for="vorname">Vorname</label>
                <input id="vorname" class="input" type="text" placeholder="Max" required />
              </div>
              <div class="form-box">
                <label class="label" for="nachname">Nachname</label>
                <input id="nachname" class="input" type="text" placeholder="Mustermann" required />
              </div>
            </div>
            <div class="form-box">
              <label class="label" for="email">E-Mail</label>
              <input id="email" class="input" type="email" placeholder="ihre@email.com" required />
            </div>
            <div class="form-box">
              <label class="label" for="geburtsdatum">Geburtsdatum *</label>
              <input id="geburtsdatum" class="input" type="date" required />
            </div>
            <div class="form-box">
              <label class="label" for="password">Passwort</label>
              <div class="password-input-container">
                <input id="password" class="input" type="password" placeholder="••••••••" minlength="8" required />
                <button type="button" class="password-toggle" id="togglePassword">
                  <svg class="eye-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                  </svg>
                </button>
              </div>
            </div>
            <div class="form-box">
              <button id="btn-submit" type="submit" class="btn primary-btn" style="width: 100%;">Konto erstellen</button>
            </div>
            <p class="login-consent">
              Mit der Registrierung akzeptierst du unsere
              <a href="https://likegroup.de/agb" target="_blank" rel="noopener noreferrer">AGB</a> und
              <a href="https://likegroup.de/datenschutz" target="_blank" rel="noopener noreferrer">Datenschutzerklärung</a>.
              <br>
              <a href="https://likegroup.de/impressum" target="_blank" rel="noopener noreferrer">Impressum</a>
            </p>
          </form>
        </div>
      </div>
    </div>
    <div class="login-right"></div>
  </div>

</body>
</html>
