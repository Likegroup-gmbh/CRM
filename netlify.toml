# Netlify Build Configuration

[build]
  command = "npm run build"
  publish = "dist"

# Netlify Functions Configuration
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  # WICHTIG: @sparticuz/chromium MUSS external sein (zu groß für Bundling)
  external_node_modules = ["@sparticuz/chromium"]

# Screenshot Function mit 60s Timeout
[functions."screenshot"]
  timeout = 60

# Dropbox Upload Function – Videos können groß sein
[functions."dropbox-upload"]
  timeout = 300

# Dropbox Proxy – chunked upload + shared links
[functions."dropbox-proxy"]
  timeout = 300

# Video-Transkription (Background Function: automatisch 15 Min Timeout, antwortet sofort 202)
# Braucht Puppeteer/Chromium wie die Screenshot-Function (external_node_modules gilt global)
[functions."transcribe-background"]
  external_node_modules = ["@sparticuz/chromium"]

# Rueckfragen vor der Skript-Generierung: Leitfaden-Markdown mit ausliefern
[functions."skript-fragen-background"]
  included_files = ["netlify/functions/_shared/prompts/**"]

# Instagram Business Discovery: bis zu 20 Graph-Calls pro Request
[functions."instagram-graph"]
  timeout = 26

# Instagram KI-Query: Claude-Parsing + Pool-Query
[functions."instagram-query"]
  timeout = 26

# Instagram Hashtag-Harvester: naechtlich + manuell (Background, 15 Min)
# Puppeteer/Chromium wie Screenshot/Transcribe (external_node_modules gilt global)
[functions."instagram-harvest-background"]
  schedule = "@daily"

# Auth-Seiten direkt ausliefern (NICHT auf index.html umleiten)
[[redirects]]
  from = "/src/auth/*"
  to = "/src/auth/:splat"
  status = 200

# SPA-Fallback für alle anderen Routen
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Anti-Indexierung: Suchmaschinen dürfen nichts cachen/listen
[[headers]]
  for = "/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow, noarchive, nosnippet"

