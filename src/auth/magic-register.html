<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrierung | CRM</title>
    <link rel="stylesheet" href="../../assets/styles/variables.css">
    <link rel="stylesheet" href="../../assets/styles/base.css">
    <link rel="stylesheet" href="../../assets/styles/layout.css">
    <link rel="stylesheet" href="../../assets/styles/components.css">
    <style>
      .loading-state {
        text-align: center;
        padding: var(--space-xl, 32px);
      }
      .error-state {
        text-align: center;
        padding: var(--space-xl, 32px);
      }
      .error-state svg {
        width: 64px;
        height: 64px;
        color: var(--color-error, #dc3545);
        margin-bottom: var(--space-md, 16px);
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid var(--border-color, #e0e0e0);
        border-top-color: var(--color-primary, #007bff);
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto var(--space-md, 16px);
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
</head>
<body style="margin: 0; padding: 0;">
  
  <div class="login-split-container">
    <div class="login-left">
      <div class="login-box">
        <div class="login-logo-wrapper">
          <img src="/assets/background/Logo-Icon-gray.svg" alt="Logo" class="login-logo">
        </div>
        
        <!-- Loading State -->
        <div id="loading-state" class="loading-state">
          <div class="spinner"></div>
          <p>Link wird überprüft...</p>
        </div>

        <!-- Error State -->
        <div id="error-state" class="error-state" style="display: none;">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z" />
          </svg>
          <h2>Link ungültig</h2>
          <p id="error-message">Dieser Link ist ungültig oder abgelaufen.</p>
          <a href="/" class="btn primary-btn" style="margin-top: var(--space-md);">Zurück zur Startseite</a>
        </div>

        <!-- Registration Form -->
        <div id="register-state" style="display: none;">
          <h2>Konto erstellen</h2>
          
          <div id="msg" class="text-error" style="display: none;"></div>

          <form id="register-form">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-md, 16px);">
              <div class="form-box">
                <label class="label" for="vorname">Vorname</label>
                <input id="vorname" class="input" type="text" placeholder="Max" required />
              </div>
              <div class="form-box">
                <label class="label" for="nachname">Nachname</label>
                <input id="nachname" class="input" type="text" placeholder="Mustermann" required />
              </div>
            </div>
            <div class="form-box">
              <label class="label" for="email">E-Mail</label>
              <input id="email" class="input" type="email" placeholder="ihre@email.com" required />
            </div>
            <div class="form-box">
              <label class="label" for="password">Passwort</label>
              <div class="password-input-container">
                <input id="password" class="input" type="password" placeholder="••••••••" minlength="8" required />
                <button type="button" class="password-toggle" id="togglePassword">
                  <svg class="eye-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                  </svg>
                </button>
              </div>
            </div>
            <div class="form-box">
              <button id="btn-submit" type="submit" class="btn primary-btn" style="width: 100%;">Konto erstellen</button>
            </div>
          </form>
        </div>
      </div>
    </div>
    <div class="login-right"></div>
  </div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.0/+esm'
  import { getSupabaseConfig } from './config.js'
  import { initPasswordHints } from './password-hints.js'

  // State Elements
  const loadingState = document.getElementById('loading-state');
  const errorState = document.getElementById('error-state');
  const registerState = document.getElementById('register-state');
  const errorMessage = document.getElementById('error-message');
  const form = document.getElementById('register-form');
  const togglePasswordBtn = document.getElementById('togglePassword');
  const btn = document.getElementById('btn-submit');
  const msg = document.getElementById('msg');

  // Supabase initialisieren
  const cfg = getSupabaseConfig();
  if (!cfg) {
    showError('Konfigurationsfehler. Bitte kontaktieren Sie den Support.');
    throw new Error('Missing Supabase config');
  }
  const supabase = createClient(cfg.url, cfg.anonKey);

  // Token aus URL holen
  const urlParams = new URLSearchParams(window.location.search);
  const token = urlParams.get('token');

  let validationData = null;

  function showError(message) {
    loadingState.style.display = 'none';
    registerState.style.display = 'none';
    errorState.style.display = 'block';
    errorMessage.textContent = message;
  }

  function showRegisterForm(data) {
    loadingState.style.display = 'none';
    errorState.style.display = 'none';
    registerState.style.display = 'block';

    const ap = data.ansprechpartner;

    if (ap.email) {
      document.getElementById('email').value = ap.email;
    }
    if (ap.vorname) {
      document.getElementById('vorname').value = ap.vorname;
    }
    if (ap.nachname) {
      document.getElementById('nachname').value = ap.nachname;
    }
  }

  function showMessage(type, text) {
    msg.style.display = 'block';
    msg.className = type === 'error' ? 'text-error' : 'text-success';
    msg.textContent = text;
  }

  // Token validieren
  async function validateToken() {
    if (!token) {
      showError('Kein Token vorhanden. Bitte verwenden Sie den vollständigen Link.');
      return;
    }

    try {
      // Magic Link mit Ansprechpartner-Daten laden
      const { data: magicLink, error: linkError } = await supabase
        .from('magic_links')
        .select(`
          *,
          ansprechpartner:ansprechpartner_id (
            id,
            vorname,
            nachname,
            email,
            ansprechpartner_unternehmen (
              unternehmen:unternehmen_id (id, firmenname)
            ),
            ansprechpartner_marke (
              marke:marke_id (id, markenname)
            )
          )
        `)
        .eq('token', token)
        .single();

      if (linkError || !magicLink) {
        showError('Dieser Link ist ungültig oder wurde nicht gefunden.');
        return;
      }

      // Prüfen ob bereits verwendet
      if (magicLink.used_at) {
        showError('Dieser Link wurde bereits verwendet. Bitte fordern Sie einen neuen Link an.');
        return;
      }

      // Prüfen ob abgelaufen
      if (new Date(magicLink.expires_at) < new Date()) {
        showError('Dieser Link ist abgelaufen. Bitte fordern Sie einen neuen Link an.');
        return;
      }

      // Erfolg - Formular anzeigen
      validationData = {
        ansprechpartner: magicLink.ansprechpartner,
        magicLinkId: magicLink.id
      };
      showRegisterForm(validationData);

    } catch (error) {
      console.error('Validation error:', error);
      showError('Ein Fehler ist aufgetreten. Bitte versuchen Sie es später erneut.');
    }
  }

  // Registrierung durchführen
  async function handleRegister(e) {
    e.preventDefault();
    msg.style.display = 'none';
    btn.disabled = true;
    btn.textContent = 'Wird erstellt...';

    const vorname = document.getElementById('vorname').value.trim();
    const nachname = document.getElementById('nachname').value.trim();
    const name = `${vorname} ${nachname}`.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    try {
      const ansprechpartner = validationData.ansprechpartner;

      // 1. Supabase Auth User erstellen
      const { data: authData, error: authError } = await supabase.auth.signUp({
        email,
        password,
        options: {
          emailRedirectTo: `${window.location.origin}/src/auth/verify-email.html?redirect_to=/kunden&magic_token=${encodeURIComponent(token)}`,
          data: { 
            role: 'kunde', 
            subrole: 'can_view', 
            name,
            vorname,
            nachname,
            source: 'magic_link',
            ansprechpartner_id: ansprechpartner.id
          }
        }
      });

      if (authError) throw authError;

      const authUserId = authData.user?.id;
      if (!authUserId) throw new Error('Registrierung fehlgeschlagen');

      // 2. Bestehenden Kunden per E-Mail wiederverwenden (kein Dubletten-Kunde)
      const { data: existingByEmail, error: existingLookupError } = await supabase
        .from('benutzer')
        .select('id, auth_user_id')
        .ilike('email', email)
        .order('created_at', { ascending: false })
        .limit(1);

      if (existingLookupError) throw existingLookupError;

      const existingKunde = existingByEmail?.[0] || null;

      if (existingKunde?.auth_user_id && existingKunde.auth_user_id !== authUserId) {
        throw new Error('E-Mail ist bereits mit einem anderen Login verknüpft.');
      }

      let benutzerData = null;
      let benutzerError = null;

      if (existingKunde) {
        const updatePayload = {
          auth_user_id: authUserId,
          name,
          vorname,
          nachname,
          rolle: 'kunde',
          freigeschaltet: true
        };

        const { data, error } = await supabase
          .from('benutzer')
          .update(updatePayload)
          .eq('id', existingKunde.id)
          .select()
          .single();

        benutzerData = data;
        benutzerError = error;
      } else {
        const { data, error } = await supabase
          .from('benutzer')
          .upsert({
            auth_user_id: authUserId,
            name,
            vorname,
            nachname,
            email,
            rolle: 'kunde',
            freigeschaltet: true
          }, {
            onConflict: 'auth_user_id'
          })
          .select()
          .single();

        benutzerData = data;
        benutzerError = error;
      }

      if (benutzerError) throw benutzerError;

      // Alle Verknüpfungen atomar über SECURITY DEFINER Funktion erstellen
      // (umgeht RLS, da nach signUp() ohne Email-Confirm kein auth.uid() vorhanden ist)
      const kundeId = benutzerData?.id;
      if (kundeId && ansprechpartner?.id) {
        const { data: linkResult, error: linkError } = await supabase
          .rpc('link_kunde_from_magic_link', {
            p_kunde_id: kundeId,
            p_ansprechpartner_id: ansprechpartner.id,
            p_magic_link_id: validationData.magicLinkId
          });

        if (linkError) {
          console.error('❌ Verknüpfung fehlgeschlagen:', linkError);
          throw new Error('Konto erstellt, aber Verknüpfung fehlgeschlagen. Bitte kontaktieren Sie den Support.');
        }

        console.log('✅ Verknüpfungen erstellt:', linkResult);
      }

      // Weiterleitung zur E-Mail-Verifizierung
      window.location.href = `/src/auth/verify-email.html?email=${encodeURIComponent(email)}&redirect_to=/kunden&magic_token=${encodeURIComponent(token)}`;

    } catch (error) {
      console.error('Registration error:', error);
      showMessage('error', error?.message || 'Registrierung fehlgeschlagen');
      btn.disabled = false;
      btn.textContent = 'Konto erstellen';
    }
  }

  // Event Listener
  form.addEventListener('submit', handleRegister);
  initPasswordHints('password');

  let isPasswordVisible = false;
  togglePasswordBtn.addEventListener('click', () => {
    const input = document.getElementById('password');
    isPasswordVisible = !isPasswordVisible;
    input.type = isPasswordVisible ? 'text' : 'password';
    const icon = togglePasswordBtn.querySelector('svg');
    if (isPasswordVisible) {
      icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"></path>';
    } else {
      icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>';
    }
  });

  // Start: Token validieren
  validateToken();
</script>
</body>
</html>
