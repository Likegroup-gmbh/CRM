<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kunden Registrierung | CRM</title>
    <link rel="stylesheet" href="../../assets/styles/variables.css">
    <link rel="stylesheet" href="../../assets/styles/base.css">
    <link rel="stylesheet" href="../../assets/styles/layout.css">
    <link rel="stylesheet" href="../../assets/styles/components.css">
</head>
<body style="margin: 0; padding: 0;">
  
  <div class="login-split-container">
    <div class="login-left">
      <div class="login-box">
        <div class="login-logo-wrapper">
          <img src="/assets/background/Logo-Icon-gray.svg" alt="Logo" class="login-logo">
        </div>
        <h2>Kunden-Registrierung</h2>

        <div id="msg" class="text-error" style="display: none;"></div>

        <form id="register-form">
          <div class="form-box">
            <label class="label" for="name">Name</label>
            <input id="name" class="input" type="text" placeholder="Max Mustermann" required />
          </div>
          <div class="form-box">
            <label class="label" for="email">E-Mail</label>
            <input id="email" class="input" type="email" placeholder="kunde@example.com" required />
          </div>
          <div class="form-box">
            <label class="label" for="password">Passwort</label>
            <input id="password" class="input" type="password" placeholder="••••••••" minlength="8" required />
          </div>
          <div class="form-box">
            <button id="btn-submit" type="submit" class="btn primary-btn" style="width: 100%;">Konto erstellen</button>
          </div>
          <div class="login-divider">
            <span>Login</span>
          </div>
          <div class="register-links-row">
            <a href="/" class="register-link-btn">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1" />
              </svg>
              Zurück zum Login
            </a>
          </div>
          <div class="login-version">Version 1.0</div>
        </form>
      </div>
    </div>
    <div class="login-right"></div>
  </div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'
  import { getSupabaseConfig } from './config.js'

  const cfg = getSupabaseConfig();
  if (!cfg) {
    const msg = document.getElementById('msg');
    msg.style.display = 'block';
    msg.textContent = 'Supabase-Konfiguration fehlt.';
    throw new Error('Missing Supabase config');
  }
  const supabase = createClient(cfg.url, cfg.anonKey);

  const form = document.getElementById('register-form');
  const btn = document.getElementById('btn-submit');
  const msg = document.getElementById('msg');

  function show(type, text) {
    msg.style.display = 'block';
    msg.textContent = text;
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    msg.style.display = 'none';
    btn.disabled = true;

    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    try {
      const { data, error } = await supabase.auth.signUp({
        email,
        password,
        options: {
          emailRedirectTo: `${window.location.origin}/src/auth/verify-email.html?redirect_to=/kunden`,
          data: { role: 'kunde', subrole: 'can_view', name }
        }
      });

      if (error) throw error;

      // Weiterleitung zur bestehenden OTP-Bestätigungsseite
      window.location.href = `/src/auth/verify-email.html?email=${encodeURIComponent(email)}&redirect_to=/kunden`;
    } catch (err) {
      console.error('❌ Registrierung fehlgeschlagen', err);
      show('error', err?.message || 'Registrierung fehlgeschlagen');
    } finally {
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
