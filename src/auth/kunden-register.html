<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kunden Registrierung | CRM</title>
    <link rel="stylesheet" href="../../assets/styles/variables.css">
    <link rel="stylesheet" href="../../assets/styles/base.css">
    <link rel="stylesheet" href="../../assets/styles/layout.css">
    <link rel="stylesheet" href="../../assets/styles/components.css">
</head>
<body style="background: #0f172a; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem;">
  
  <div class="login-box">
    <h2 style="margin-bottom: 0.5rem;">Kunden-Registrierung</h2>
    <p style="text-align: center; color: var(--text-secondary); font-size: 0.875rem; margin-bottom: 1.5rem;">
      Erstellen Sie Ihren Zugang zum Kunden-Portal
    </p>

    <div id="msg" style="display: none; padding: 0.75rem 1rem; border-radius: 8px; margin-bottom: 1rem;"></div>

    <form id="register-form">
      <div class="form-box">
        <label class="label" for="name">Name</label>
        <input id="name" class="input" type="text" placeholder="Max Mustermann" required />
      </div>
      <div class="form-box">
        <label class="label" for="email">E-Mail</label>
        <input id="email" class="input" type="email" placeholder="kunde@example.com" required />
      </div>
      <div class="form-box">
        <label class="label" for="password">Passwort</label>
        <input id="password" class="input" type="password" placeholder="••••••••" minlength="8" required />
      </div>
      <div class="form-box">
        <button id="btn-submit" type="submit" class="btn primary-btn" style="width: 100%;">Konto erstellen</button>
      </div>
      <div class="form-box" style="text-align: center; margin-top: 0.5rem;">
        <a href="/" style="color: var(--text-secondary); text-decoration: none; font-size: 0.875rem;">Zurück zum Login</a>
      </div>
      <p style="color: var(--text-tertiary); font-size: 0.75rem; text-align: center; margin-top: 1rem;">
        Mit der Registrierung stimmen Sie unseren Nutzungsbedingungen zu.
      </p>
    </form>
  </div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'
  import { getSupabaseConfig } from './config.js'

  const cfg = getSupabaseConfig();
  if (!cfg) {
    const msg = document.getElementById('msg');
    msg.style.cssText = 'display: block; background: #fef2f2; border: 1px solid #fecaca; color: #991b1b;';
    msg.textContent = 'Supabase-Konfiguration fehlt.';
    throw new Error('Missing Supabase config');
  }
  const supabase = createClient(cfg.url, cfg.anonKey);

  const form = document.getElementById('register-form');
  const btn = document.getElementById('btn-submit');
  const msg = document.getElementById('msg');

  function show(type, text) {
    const styles = type === 'success' 
      ? 'display: block; background: #ecfdf5; border: 1px solid #a7f3d0; color: #065f46;'
      : 'display: block; background: #fef2f2; border: 1px solid #fecaca; color: #991b1b;';
    msg.style.cssText = styles;
    msg.textContent = text;
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    msg.style.display = 'none';
    btn.disabled = true;

    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    try {
      const { data, error } = await supabase.auth.signUp({
        email,
        password,
        options: {
          emailRedirectTo: `${window.location.origin}/src/auth/verify-email.html?redirect_to=/kunden`,
          data: { role: 'kunde', subrole: 'can_view', name }
        }
      });

      if (error) throw error;

      // Weiterleitung zur bestehenden OTP-Bestätigungsseite
      window.location.href = `/src/auth/verify-email.html?email=${encodeURIComponent(email)}&redirect_to=/kunden`;
    } catch (err) {
      console.error('❌ Registrierung fehlgeschlagen', err);
      show('error', err?.message || 'Registrierung fehlgeschlagen');
    } finally {
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
